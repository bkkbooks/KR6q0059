  - {type: variant, offset: 268, length: 247, content: 頻呼小玉之音與檀郎認得之音。然後大唱此音。不數德山歌。壓倒雲門曲。凡樓子我若無心之音。及盤山紅輪西去之音。皆當立下風。盡是老凍膿。所以於建炎中興天子前。奏此一音。四海寂默。而無敢鳴。雲居安樂堂上。擅此一音。眾人憎嫉。而無敢和。且道。此老子乘誰恩力。得恁麼奇特。昔孔子窮於陳蔡之間。左據槁木。右擊槁枝而歌。焱氏之風。有其具而無其數。有其聲而無宮角。木聲與人聲。犁然有當於人之心。乃曰。今之歌者其誰乎。是亦此音。而世未之知也。圓悟老師其知之矣。予蚤事佛鑑。晚見老師。叩此一音。更無別調。學徒若平亦唱師家曲者。集師語要將以刊行。求為序篇。以冠卷首。若知此音。則圓悟老師功不浪施。若不知, 甲: ''}
