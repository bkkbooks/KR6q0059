front:
  text: 圓悟佛果禪師語録序龍圖閣直學士左朝奉大夫知處州軍州事兼管內勸農使耿延禧撰佛以一音而演說法故一切法同此一音三世諸佛此一音六代祖師此一音天下老和尚此一音吾有正法眼藏分付摩訶迦葉乃此一音正法眼藏向這瞎驢邊滅却亦此一音以至風動林響泉鳴谷應亦此音雷霆霹靂雨雹交橫亦此音人語市聲鵓鳩蛇蟇倉庚寒蟬亦此音麻三斤庭前柏樹子得髓得皮老兄未徹拄杖子𨁝跳上三十三天觀音胡餅却是饅頭無非此音以至一切語言銅鑼盛油銀碗盛雪鷓鴣啼華珊瑚撑月不落不昧通身遍身將心與汝安吸盡西江水亦無非此音不作此音會而作語言謷訛妄生分別無有是處昔楊岐以此音簧鼓天下至圓悟大禪師此音益震師因頻呼小玉之音與檀郎認得之音然後大唱此音不數德山歌壓倒雲門曲凡樓子我若無心之音及盤山紅輪西去之音皆當立下風盡是老凍膿所以於建炎中興天子前奏此一音四海寂默而無敢鳴雲居安樂堂上擅此一音衆人憎嫉而無敢和且道此老子乘誰恩力得恁麼奇特昔孔子窮於陳蔡之間左據槁木右擊槁枝而歌焱氏之風有其具而無其數有其聲而無宮角木聲與人聲犁然有當於人之心乃曰今之歌者其誰乎是亦此音而世未之知也圓悟老師其知之矣豫蚤事佛鑑晚見老師叩此一音更無別調學徒若平亦唱師家曲者集師語要將以刊行求為序篇以冠卷首若知此音則圓悟老師功不浪施若不知此音而以語言文字求會解者是人行邪道不能見老師云紹興三年十二月二十日序圓悟禪師克勤嘗被遇今上皇帝對揚正法眼藏其道盛行僧若平鳩工聚材欲以師法語傳諸天下以待後學託嚴州天寧老元弼丐豫為敘吁此果師之本旨哉豫聞師常偃處一室坐斷語言轉無上法輪不容擬議揚眉開口立便喪身才涉廉纖老拳隨起每舉到不與萬法為侶公案已是拖泥帶水落第二義今乃欲褒集其平昔咳唾之音鋪陳而揄揚之師其聞而有不釋然者乎雖然師之不得已而有言我知之矣譬彼時雨隨物濟潤遐陬僻處枯根蠧芽若大若小各各霑足而太虛空本自無相亦無有作觀覽于斯者宜得之言意之表此集之行在在處處當有神物護持云紹興四年二月日檢校少保定國軍節度使知樞密院事南陽郡開國侯張浚序圓悟佛果禪師語録目録卷第一上堂一卷第二上堂二卷第三上堂三卷第四上堂四卷第五上堂五卷第六上堂六卷第七上堂七卷第八上堂八小參一卷第九小參二卷第十小參三卷第十一小參四卷第十二小參五卷第十三小參六普說卷第十四法語上卷第十五法語中卷第十六法語下書拈古上卷第十七拈古中卷第十八拈古下頌古上卷第十九頌古下卷第二十偈頌真讚雜著佛事圓悟佛果禪師語録目録終
