body:
  text: 宋平江府虎丘山門人紹隆等編偈頌高宗在藩邸三次請升座説偈善因招善果種粟不生豆大福德人修大福德人受八萬四千波羅蜜一毫頭上已圓成棒頭喝下承當得高步毗盧頂上行至簡至易至尊至貴往還千聖頂𩕳頭世出世間不思議彈指圓成八萬門超直入如來地衆生本來是佛放憨放癡貪世味間情誰管真如地有時得片好風光十字街頭恣遊戲寓言昔聞沈巨浸一舉十二鼇持此淨華宿曾未及秋毫濛濛大象中出沒安可逃只自且循緣著意真徒勞舉民公充座元有偈曰休誇四分罷楞嚴按下雲頭徹底參莫學亮公親馬祖還如德嶠訪龍潭七年往返遊昭覺三載翱翔上碧巖今日煩充第一座百華叢裏現優曇示衆辦道應須辦自心心真觸處是通津直明格外無生忍端作區中解脫人吸盡西江龐老口搏將妙喜淨名身八風五欲莫能轉解向塵中轉法輪佛鑑和尚忌辰示衆去年正今日泥牛鬪入海今年正今日遍界舒光彩虛空無相身佛鑑儼然在非色亦非心不小復不大劫石可移動箇中無變改要知佛鑑恩各人明主宰一句逗群機志心常頂戴且道是那一句喫飯咬著沙示丹霞佛智裕禪師二三四七初無間顯大威光示的傳把斷關津勿輕放草深誰顧法堂前示擇言禪人三偈參禪參到無參處窮玄窮徹玄盡頭渴飲飢餐只恁麼世間出世沒蹤由機關並是間家具玄妙渾成破草鞋鐵額銅頭超佛祖橫拈倒捉一坑埋紅塵有底論成道寒谷無人可作春苟識拈華微笑意一番拈弄一番新示若平禪人贊弼住山功已立荷擔長久志彌堅雲門庵創壓歐阜天上高天更有天追復古來清淨剎他時會見美聲傳賓主相投膠漆合相與弘持臨濟禪送智祖禪德一句當機領千差路絶攀去來長若鑑喧寂鎮如山百草顛頭峻孤雲世外間行行牢把著宜闡上頭關送安首座回德山使乎不辱命臨機貴專對安禪捋虎鬚著著超方外不惟明窗下安排掇向禪床拶嶮崖拈槌竪拂奮雄辨金聲玉振猶奔雷九旬落落提綱宗衲子濟濟長趍風解黏去縛手段辣驅耕奪食尤雍容夏滿思山要歸去了却武陵一段事勃窣理窟乃胸中行行不患無知己臨行索我送行篇栗棘蓬裏金剛圈短歌須要數十丈長句只消三兩言金毛師子解翻身箇是叢林傑出人不日孤峯大哮吼五葉一華天地春送梵思禪老皖山住庵脫去羈羅徹轡銜了無毫末可容參馬駒兒踏誰禁得皖伯臺前去住庵送達侍者之武陵臨濟昔遣將驗德嶠行令接住與一送果別探竿影國師三度喚聲聲無不領負汝負吾機直透千聖頂古人曾侍香根器如此警爾數載巾瓶己合得正命今復自帝都直遊武陵境打辦俊精神也要識禪病截斷風前句奪取佛祖柄歸來大誇詫強將果然猛送修道者不下笠子勘俱胝一句擊出一古佛如今歸去舊雲庵參遍諸方善知識卓卓頂門眼輝騰如杲日勉力傳持無盡燈繼取末山舊蹤迹送諸化士九首豁達靈明印腳跟用來了不隔纖塵歷遊華藏毗盧界把住牟尼百億身八寶七珍皆我有左穿右穴與誰鄰勞生袞袞堪垂手乃是通方自在人皎皎林間月悠悠天際雲去來非有纍圓缺本無垠逗水光常淨為霖意不群溪山千萬里同異許誰論迦葉剎竿頭此老曾饒舌全體解承當祖祖何曾別要明箇段事須善觀時節遇著與麼人眼中為出屑庶見北山門戢戢皆雲衲妙手廣施呈翻却驪龍穴千聖頂𩕳頭有破天大路唯是無心人始能闊著步恰如履平地日行千百度要引滿世間一齊與麼去爾垂手入𮠔應須善回互鬧鬨處相逢當機宜把住似過金剛圈請盡情分付歸來善法堂撾取大法鼓覿面豁開三要印全機直明正法藏持去江西顯本宗三日耳聾無伎倆要須撒手向孤峯選甚懸崖千萬丈欲知稱意得錦鱗騰身快入驚人浪四料四賓主三玄及三要擊石火電光乃臨濟垂範既參臨濟禪亦須自點檢照用喝下奇殺活杖頭驗以此入郊𮠔大奮薑維膽光榮作鳳輝七珍只一覽無位真人赤肉團面門出入若為看棒頭按正風前令喝下逼將肝膽寒不立階梯那事佛有真規矩得心安橫身百草顛頭用插手驪龍窟裏翻要見衲僧全意氣如麻萬境莫能干大緣唾手間能辦未信人生行路難撥轉千差向上機攙旗奪鼓不饒伊翻身踞地全生殺始是金毛師子兒吸盡西江匹似間作家豈復尚機關放教性地平如砥成佛功歸一眴間送慧恭先馳之平江一句單提越祖佛痛劄針錐窮徹骨出門便作師子兒敵勝驚群資返擲平江古來豪俠窟去去先通箇消息此行不作等間來八面清風起衣裓送景元先馳之毗陵當陽提起截千差誰信風流出當家要入廛中通一線等間開取鉢曇華善專對不辱命乃見摩醯三眼正引著群靈使共行明明直截曹溪徑楊無咎觀察昔在皇都參會底與今豈復有差殊等間乘興重拈似鬨堂棒腹一軒渠佛祖命門提在手放開揑聚更非他已到懸崖撒手處從來關捩子無多示善友此段本來無向背要須堅猛力行持金剛正眼通身是萬境來侵莫管伊頌月上女因緣本來正體徹根源山入同途只此門已住如來大解脫掌中至寶耀乾坤頌黃龍三關我手何似佛手隨分拈華折柳忽然摸著蛇頭未免遭他一口我腳何似驢腳趙州石橋略彴忽若築起皮毬崩倒三山五嶽人人有箇生緣蹲身無地鑽研忽若眼皮迸破慮他桶底踢穿三毒頌溝壑難充一念欲泥梨永劫苦何堪悟將萬法皆如幻慎勿容心瞥起貪未見世間為大患焚燒功德莫過嗔頭頭違順須容却喜捨慈悲出六塵羅剎無明徹底癡翳他正體發狂機猛操般若金剛劍永斷渠儂撒手歸妄起渾由三箇漢牽拖六道四生中倏然調伏無功用端與毗盧性海通真讚睦州和尚辛辛辣辣啀啀喍喍識濟北為大樹拶雲門墮嶮崖機峻莫偕言如枯柴夫是之謂陳蒲鞋死心和尚舍利箇是黃龍老大蟲火後晶熒真舍利萬年如日出世間與善知識作儀軌平生斥佛呵祖口於斯乃驗著實底留將法子法孫傳觸處放光常動地六祖大師稽首曹溪真古佛八十生為善知識示現不識世文書信口成章徹法窟葉落歸根數百秋堅固之身鎮韶石皎如赫日照長空煥若驪珠光太極定慧圓明擴等慈所求響應猶空谷河沙可數德莫量併出渠儂悲願力楊岐和尚三腳驢子弄蹄行解道鉢盂口向天荷擔他一百二十斤重擔子牽梨拽杷無端壞却慈明禪白雲端和尚楊岐腦後眼豈親透得金塵能幾人扶持臨濟一拳拳倒黃鶴樓華劈二祖鼻孔依前搭上唇五祖演和尚山前一片間田地松竹引風長襲人説心説性老僧箇裏是惡口偏提賤賣擔版貼稱麻三斤真如哲和尚叢林老作世無儔凜凜威光四百州一擊鐵關如粉碎恩大難將雨露酬丹霞佛智裕長老請讚奮雷霹靂赤肉團壁立星飛電擊臨濟命脈渠儂突出驀地面門拶出初無一物三玄三要輝赫分付佛智碎却人窠窟與祖宗雪屈咄華藏民長老請讚臨濟正法眼從這瞎驢滅父子不相傳神仙有祕訣豈顧殃及兒孫且圖眼中出屑逢人好一札切忌向渠説道洙首座請讚紫羅帳裏撒真珠夜明簾外提巴鼻句下三要三玄何人親得的旨面門無位真人放渠出一頭地梵思維那請讚單提臨濟正法眼當機密付要瞎驢無位真人乾屎橛棒頭喝下絶名模當年海會大蟲咬今日歐峯舉似渠圓悟不惜兩莖眉洪爐焰裏綻芙蕖惟祖知藏請讚掃蕩佛祖不存性命鐵樹華開神駒十影圓悟傳來臨濟禪忽雷驀震千峯頂法一書記請讚化城踏破寶所非留當陽截斷機關透出百草顛頭揮臨濟之吹毛駕慈明之巨舟頭角相似氣類相投全機一喝分賓主須信渠儂得自由子文監寺請讚威如猛虎出深林皎若銀蟾轉太清望之儼如即之也溫闡摩醯正眼於頂𩕳突無位真人於面門有誰領此豈可顯言分付子文道元禪客請讚臨濟正法眼藏突出三頭六臂忿怒驀撲帝鍾謾且神通遊戲圓悟當胸一拳鎖斷衲僧巴鼻德珂禪人請讚眼裏有瞳子頂門亞一指放出金剛圈舉世提不起箇中領略要渠儂鐵作脊梁金作齒恁麼便行喪兒孫不恁麼行校些子滅却正眼瞎驢邊圓悟風光動天地景元侍者請讚生平只説聱頭禪撞著聱頭如鐵壁脫却羅籠截腳根大地撮來墨漆黑晚年轉復沒忉忉奮金剛鎚碎窠窟他時要識圓悟面一為渠儂併拈出法昭維那請讚大包無外細入毫芒現寶華王隨處道場建立掃蕩正體堂堂一語壁立濟濟鏘鏘渠儂此面目何人解提將圓悟栗棘蓬覿體沒商量克賓話把播諸方韓朝議請讚撥轉上頭關千聖須却步唯許箇中人要通一線路具茨脫諸緣投誠信此事誓無雜用心長時箭相拄貌出山野姿踞不蔭高樹按杖正令行提持那一句善財鞠躬前風神全體露氣類自相同美哉名父子惟表知藏請讚此著千聖頂𩕳上臨濟建立大法幢萬丈懸崖解放身可以一口吸西江石火電光猶是鈍虎肩插翅定無雙勝居禪人請讚夜明符燭天吹毛劍照雪神威冷森森紅光阿剌剌未啓口時當頭截欲入門來劈面喝體裁相似可克家此地不容通水泄若平禪老請讚高擁毳袍橫按拄杖作意提綱截斷伎倆放出向上一機千聖魂亡膽喪於此有人承當便見千了百當圓悟杖頭一滴禪西江十八灘俱漲曇玩禪德住頭陀巖庵請讚盤陀石上橫按拄杖睟質儼然曾無伎倆不施栗棘金圈不愛起模畫樣頭陀巖頂偶行拳打著渠儂也沒量懷祖知殿請讚瘦而精健老有餘韻鼓兩片皮説法無吝掃併情識不留纖眹七處道場恰如一瞬有箇不顧危亡僧剛地要來衝雪刃咄文皓禪人請讚岷峨濯秀屹西南氣象盤回鬱翠藍英傑間生從古習豈容凍膿輒相參自不將領玷閭里賴有舌本操玄談得請居間皓目擊持歸先為結茅庵蘊遇小師請讚日面月面並現印空印水雙彰機先不留眹迹格外亦絶承當父子至親路別各各頂有圓光切恐與人明破此門豈可商量禪人寫真求讚二十首泡幻中出枯木朽株頂缺神骨額無圜珠曾遭海會毒龍咬快意追風天馬駒施設千種巧其實一物無若憑這箇見至了不識渠混沌未分時無此箇面孔泡幻既張皇乃具足十種胸次不立纖塵口角波濤洶涌唯有一件長愛打破漆桶乍嗔乍喜渾只由爾最愛謾人搖唇弄嘴忍草遍地生何曾澆法水傾倒心肝一句禪箇些兒子猶呈瑞模子中脫出佛果老古錐萬緣休歇處端坐不言時移刻定動奮迅全威為人到徹骨不惜兩莖眉挈挈似紅藥跛跛如雲門殊無二老實空蘊二老文放下會事索破沙盆寶鑑一塵秋空片雲一見便見了本來面敏手丹青應緣而現漸近縱心愈見強健唯用金圈栗蓬要須千煆百煉撒手萬仞崖頂門廓正眼幻出成相真蘊其中挺然骨目四座生風傳不可傳之心振不可振之宗老出皇都晚住歐峯只這沒回互領略在渠儂咄句中沒禪格外無玄當面不見斷莫可傳似玉溫潤如月孤圓氣媚川源光流大千衲衣逋峭活卓卓片段殘雲籠巨嶽壁立萬仞近不得無佛無祖無棒喝一口吸盡西江水箇是圓悟當頭著相現無相心出非心如印印空逈絶古今入師子窟遊栴檀林脫去羈韁履薄臨深要識圓悟立處孤峯萬仞嶔岑紅爐焰裏著點雪夜明簾外剔金燈萬丈寒潭氷徹底妙高峯頂玉稜層等是渠儂遊歷處萬機普應初不曾圓悟老來垂隻手為問何人似我能利刃斬虛空神箭穿紅日用吞十方口吹此無孔笛如斯三十年不費纖毫力信彩直鉤頭也有錦鱗食有眼自承當慎勿從渠覓大機要頓發大用要直截馬師老百丈無端已漏泄臨濟喚火來坐斷天下舌此老據胡床也要恁麼説説不説萬里青天一輪月危坐盤陀風神峻整橫楖𣗖笻廓千聖頂誰是仙陀未言先領一片風光奪人奪境圓悟晚來益深沈華陰山頭百尺井立地可成佛殺人不眨眼碎生死窠窟要箇倜儻漢圓悟從來提此著風前白雲曾喝散當家種草可相從利劍七星光燦爛句裏有出身突在千聖頂當機絶籠羅透徹無邊境生平秉此金剛王四喝三玄格外領面門拶却太周遮唯是瞎驢傳性命覿面全真不計疏親虎頭燕頷未盡渠神把斷關津不放過無邊剎海乃比鄰太虛寥廓憑誰悟翻身背擲真師子透頂透底沒遮攔千峯峭絶轟一句略開圓悟上頭關浮幢剎海闊著步道不在丹青禪不在面相強自貌將來讚之作何狀且就箇現成為汝説一上赤水求神珠得之由罔象圓悟老古錐老來沒伎倆英禪把將去滔天滾白浪本無箇面目突出六十七今汝強圖貌頂門欠三隻七處入鬧藍近來稍寧謐若更打葛藤豈有休歇日三十年後與人看圓悟從前沒窠窟太清之雲明鏡之塵於無相中驀現此身考實究妙以何為真不出這箇一著最親透得剔脫與古為鄰道絶形相名存至公對現色身本體全空要求巴鼻不西不東月映澄潭風搖古松十成圓悟誰識渠儂通身無影像溢目生光彩動用峭於山語默深於海曠劫正如如箇中無變改跳得圓悟金剛圈須信大功元不宰真如禪人請讚只這嘴面見一乃萬要是箇中人手親即眼辦佛果應緣圓悟成現如如觸處得逢渠一道神光本無間真了禪人請讚丹青有神貌活圓悟據坐儼如風光全露捺膝聾身擡眸直顧歐峯頂上把要津一任青冥轉烏兔雜著和靈源瞌睡歌懵懵懂懂無巴無鼻兀兀陶陶絶忌諱任信流光動地遷不論冬夏唯瞌睡箇中滋味佛不知空咄蚌蛤與螺師放身不管臥水底興發長挨布袋兒鼻息如雷誰顧得尋常少見有醒時沒醒時良有以要明瞌睡中宗旨從來一覺到天明佛來不解擡身起縱使舒光遍大千終難換我無憂底校疏親渾打失瞌睡根靈莫窮詰有人契會便同參睡著須知更綿密修道者若虛庵銘修禪道人隨身卓庵取名於佛果老子因與名之若虛乃會三為一也而不出本分事及禪教永嘉云體若虛空沒涯岸佛經云佛真法身猶若虛空混元云深藏若虛宣尼云實若虛云一滴滴水一滴滴凍只麼平常表裏空洞根塵絶偶六門互用快住此庵十八不共要戲罅隙灼然無縫應物非緣誰為幻夢破妄傳達磨胎息論西方大聖人出迦維羅作無邊量妙用顯發剎塵莫數難思議殊特勝因以啓迪群靈其方佛順逆開遮餘言餘典盈溢寶藏及至下梢始露一實消息謂之教外別行單傳心印金色老子以來的的綿綿只論直指人心見性成佛不立階梯不生知見利根上智向無明窟子裏瞥破煩惱根株中活脫應時超證得大解脫是故竺乾四七東土二三皆龍象蹴踏師勝資強機境言句動用語默有上上乘器格外領略當下業障氷消直截承荷於餘時自能管帶打成一片度世絶流頓契佛地尚不肯向死水裏浸却唱出透玄妙越佛祖削去機緣剗斷露布如按太阿凜凜神威阿誰敢近作家漢確實論量才有向上向下勝妙性理作用纖毫即叱之不是從來種草直下十成煆煉得熟踐履得實始與略放過猶恐異時落草負纍人瞎却正法眼嗟見一流拍盲野狐種族自不曾夢見祖師却妄傳達磨以胎息傳人謂之傳法救迷情以至引從上最年高宗師如安國師趙州之類皆行此氣及誇初祖隻履普化空棺皆謂此術有驗遂至渾身脫去謂之形神俱妙而人間厚愛此身怕臘月三十日慞惶競傳歸真之法除夜望影喚主人翁以卜日月聽樓鼓驗玉池覘眼光以為脫生死法真誑謔閭閻揑偽造窠貽高人嗤鄙復有一等假託初祖胎息説趙州十二時別歌龐居士轉河車頌遞互指授密傳行持以圖長年及全身脫去或希三五百歲殊不知此真是妄想愛見本是善因不覺墮在荒草而豪傑俊頴之士高談大辨下視祖師者往往信之豈知失顧步畫虎成狸遭有識大達明眼覷破居常衆中唯默觀憫憐豈釋迦文與列祖體裁止如是耶曾不自回照始末則居然可知矣海內學此道者如稻麻竹𥯤其高識遠見自不因循恐乍發意未深入閫奧揭志雖專跂步雖遠遇增上慢導入此邪見林未上一錯永沒回轉其流浸廣莫之能遏因出此顯言庶有志願於大解脫大總持可以辨之而同入無生大薩婆若海泛小舟濟接群品俾真正道妙流於無窮豈不快哉辨偽老漢生平久歷叢席遍參知識好窮究諸宗派雖不十成洞貫然十得八九亦通會示徒自不造次不知何人盜竊山僧該博之名遂將此亂道為山僧所出觀之使人汗下面赤況老漢尚自未死早已見如此狼藉請具眼衲子詳觀之勿認魚目作明珠也佛事為智海法真和尚入龕釋迦雙樹示寂偃臥吉祥法真智海告終端坐行上四十年道價七十一生緣德播寰中聲馳海外人天敬仰朝野傾崇比望永作梯航長光佛祖豈期忙中縮手鬧裏抽身最後皇都大作佛事今則未埋玉樹先入雲龕公案現成須至一決大衆因行不妨掉臂伎倆不如帳樣為瑞為祥無邊無量請老和尚且出方丈為佛眼和尚舉哀三十年行道海上第一人颯然恁麼去唯見不酸辛雖然如是須知佛眼未曾生未曾死未曾去未曾來正與麼時如何乃指龕云我與雪峯同條生不與雪峯同條死要知末後句分明普請大衆齊聲舉乃云哀哀為佛眼和尚下火如來涅槃日娑羅雙樹間放出三昧火闍維金色身有條攀條無條攀例故褒山佛眼禪師道播四海名聞九州二十年間三據大剎退席褒嶺宴坐鍾山以平生所受用栗棘蓬驅耕夫之牛以楊岐所付囑金剛圈奪飢人之食傳持一大事提振向上機衲子雲從諸方景慕豈謂一彈指頃坐斷報化佛頭談笑之間遽失人天正眼今則乾坤廓落人境蕭條雪映高山風清大野圓頂後相放萬里神光大衆正與麼時還委悉麼看取亘天紅焰裏華發優曇大地春為妙禪人下火昨日一箇正可憐今朝一箇更凄然翻身踏著曹溪路妙體堂堂沒變遷妙師愛參禪祖佛要齊肩索然恁麼去一朵火中蓮生也浮雲突出死也空華倏沒頂後圓同太虛畢竟非心非佛大衆看取一道紅光爍破無生窠窟為佛真大師下火觸目菩提真解脫頂門正眼耀乾坤透得生死關廓然無起滅佛真大師生平滴水滴凍勇猛截鐵斬釘舉世重其為人聞見莫不欽歎內侍叢中跳出衲僧隊裏修行淵聖錫徽名皇后賜度牒驚群伏衆絶類離倫將謂萬里前程豈期百年頃刻今則翻身長往透出金圈栗棘蓬頂後圓光應現無生大火聚佛真佛真急著眼保雲程一炬紅光才舉處毗盧頂上任縱橫為範和尚下火忠臣不畏死故能立天下之大事勇士不顧生故能成天下之大名衲僧家透脫生死不懼危亡故能立佛祖之紀綱昭覺和尚神機峭拔智辨滔天肘臂下有符頂門上具眼奮喝散白雲底意氣操打破虛空底鉗鎚一歸錦官兩住雄剎闢開荊棘路坐斷是非關接物利生光揚佛日臨岐一著擺撥便行絶後光前頭正尾正如今既到這裏可謂世緣畢備末後殷勤截斷路頭一堆猛火大衆且道畢竟向什麼處去舉火炬云烈焰亘天留不得當空寶月鎮長圓為亡僧下火五蘊山頭涅槃路四方八面沒遮襴通身盡是金剛眼一粒靈丹火裏燃
